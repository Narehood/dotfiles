# Kali-style prompt defaults
# Copy/override at ~/.config/dotfiles/prompt.conf (created on install).
# Edit the user file to customize; this tracked file is the fallback.

# Layout: twoline | oneline | backtrack
PROMPT_ALTERNATIVE=twoline

# Print a blank line before each prompt (after the first)
NEWLINE_BEFORE_PROMPT=yes

# Emoji between user and host (twoline prompt)
PROMPT_EMOJI=😈
PROMPT_EMOJI_ROOT=💀

# Named colors used by bash and zsh prompts
# Common values: green blue red yellow cyan magenta white brightblue brightred
PROMPT_COLOR_USER=green
INFO_COLOR_USER=boldblue
PROMPT_COLOR_ROOT=brightblue
INFO_COLOR_ROOT=boldred

# Zsh right prompt: show exit status and background job count
SHOW_RPROMPT=no
